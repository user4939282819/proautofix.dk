<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#000"/>
  <!-- Gear -->
  <circle cx="28" cy="26" r="7" fill="none" stroke="#fff" stroke-width="2.5"/>
  <circle cx="28" cy="26" r="3" fill="#fff"/>
  <!-- Gear teeth -->
  <rect x="25.5" y="16" width="5" height="4" rx="1" fill="#fff"/>
  <rect x="25.5" y="32" width="5" height="4" rx="1" fill="#fff"/>
  <rect x="18" y="23.5" width="4" height="5" rx="1" fill="#fff"/>
  <rect x="34" y="23.5" width="4" height="5" rx="1" fill="#fff"/>
  <rect x="20" y="18" width="4" height="4" rx="1" fill="#fff" transform="rotate(45 22 20)"/>
  <rect x="34" y="18" width="4" height="4" rx="1" fill="#fff" transform="rotate(45 36 20)"/>
  <rect x="20" y="30" width="4" height="4" rx="1" fill="#fff" transform="rotate(45 22 32)"/>
  <rect x="34" y="30" width="4" height="4" rx="1" fill="#fff" transform="rotate(45 36 32)"/>
  <!-- Wrenches crossed -->
  <line x1="16" y1="44" x2="40" y2="20" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="44" x2="16" y2="20" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- PAF text -->
  <text x="32" y="58" font-family="Arial Black" font-size="7" font-weight="900" fill="#dc2626" text-anchor="middle" letter-spacing="1">PAF</text>
</svg>
